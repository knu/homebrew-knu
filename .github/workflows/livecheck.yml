name: Livecheck and Auto-update

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      auto_pr:
        description: 'Create PRs for outdated packages'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  livecheck:
    runs-on: macos-latest
    env:
      AUTOMATION_APP_ID: ${{ secrets.AUTOMATION_APP_ID }}
      AUTOMATION_APP_PRIVATE_KEY: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}
      AUTOMATION_REVIEWER: ${{ vars.AUTOMATION_REVIEWER || github.repository_owner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ env.AUTOMATION_APP_ID }}
          private-key: ${{ env.AUTOMATION_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Add tap
        env:
          REPO: ${{ github.repository }}
        run: brew tap "$REPO"

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

      - name: Initialize summary
        run: |
          echo "## Livecheck Results" >> "$GITHUB_STEP_SUMMARY"

      - name: Check and update formulae
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_REVIEWER: ${{ env.AUTOMATION_REVIEWER }}
          AUTO_PR: ${{ github.event.inputs.auto_pr || 'true' }}
          REPO: ${{ github.repository }}
        run: |
          # shellcheck disable=SC2001
          TAP=$(echo "$REPO" | sed 's|/homebrew-|/|')

          update_formula() {
            local name="$1"
            local new_version="$2"
            local branch="bump-$name-$new_version"
            local existing_pr=""

            echo "Updating $name to $new_version..."

            existing_pr=$(gh pr list --state open --head "$branch" --json number --jq '.[0].number')
            if [ -n "$existing_pr" ]; then
              git fetch origin "$branch"
            fi

            git checkout -B "$branch" origin/main

            brew bump-formula-pr --no-browse --no-fork --write-only \
              --version="$new_version" \
              "$TAP/$name"

            if ! git diff --stat | grep -q .; then
              git checkout main
              return 0
            fi

            git add Formula/"$name".rb
            git commit -m "$name $new_version"

            if [ -n "$existing_pr" ] && git diff --quiet "origin/$branch" HEAD -- Formula/"$name".rb; then
              echo "PR #$existing_pr for $branch already has the latest content; skipping."
              git checkout main
              return 0
            fi

            git push -f origin "$branch"

            if [ -z "$existing_pr" ]; then
              pr_args=(
                --title "$name $new_version"
                --body "Automated version bump to $new_version"
                --label automerge
                --base main
                --head "$branch"
              )
              if [ -n "$PR_REVIEWER" ]; then
                pr_args+=(--reviewer "$PR_REVIEWER")
              fi
              gh pr create "${pr_args[@]}"
            fi

            git checkout main
          }

          echo "### Formulae" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for formula in Formula/*.rb; do
            [ -f "$formula" ] || continue
            name=$(basename "$formula" .rb)
            echo "::group::livecheck $name"
            result=$(brew livecheck "$TAP/$name" --json) || {
              echo "livecheck failed for $name"
              echo "::endgroup::"
              continue
            }
            echo "$result"
            echo "::endgroup::"

            current=$(echo "$result" | jq -r '.[0].version.current')
            latest=$(echo "$result" | jq -r '.[0].version.latest')

            echo "- **$name**: $current → $latest" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$latest" ] && [ "$latest" != "null" ] && [ "$current" != "$latest" ] && [ "$AUTO_PR" == "true" ]; then
              update_formula "$name" "$latest"
            fi
          done

      - name: Check and update casks
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_REVIEWER: ${{ env.AUTOMATION_REVIEWER }}
          AUTO_PR: ${{ github.event.inputs.auto_pr || 'true' }}
          REPO: ${{ github.repository }}
        run: |
          # shellcheck disable=SC2001
          TAP=$(echo "$REPO" | sed 's|/homebrew-|/|')

          update_cask() {
            local name="$1"
            local new_version="$2"
            local branch="bump-$name-$new_version"
            local existing_pr=""

            echo "Updating $name to $new_version..."

            existing_pr=$(gh pr list --state open --head "$branch" --json number --jq '.[0].number')
            if [ -n "$existing_pr" ]; then
              git fetch origin "$branch"
            fi

            git checkout -B "$branch" origin/main

            brew bump-cask-pr --no-browse --no-fork --write-only --no-audit \
              --version="$new_version" \
              "$TAP/$name"

            if ! git diff --stat | grep -q .; then
              git checkout main
              return 0
            fi

            git add Casks/"$name".rb
            git commit -m "$name $new_version"

            if [ -n "$existing_pr" ] && git diff --quiet "origin/$branch" HEAD -- Casks/"$name".rb; then
              echo "PR #$existing_pr for $branch already has the latest content; skipping."
              git checkout main
              return 0
            fi

            git push -f origin "$branch"

            if [ -z "$existing_pr" ]; then
              pr_args=(
                --title "$name $new_version"
                --body "Automated version bump to $new_version"
                --label automerge
                --base main
                --head "$branch"
              )
              if [ -n "$PR_REVIEWER" ]; then
                pr_args+=(--reviewer "$PR_REVIEWER")
              fi
              gh pr create "${pr_args[@]}"
            fi

            git checkout main
          }

          echo "### Casks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for cask in Casks/*.rb; do
            [ -f "$cask" ] || continue
            name=$(basename "$cask" .rb)
            echo "::group::livecheck $name"
            result=$(brew livecheck --cask "$TAP/$name" --json) || {
              echo "livecheck failed for $name"
              echo "::endgroup::"
              continue
            }
            echo "$result"
            echo "::endgroup::"

            current=$(echo "$result" | jq -r '.[0].version.current')
            latest=$(echo "$result" | jq -r '.[0].version.latest')

            echo "- **$name**: $current → $latest" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$latest" ] && [ "$latest" != "null" ] && [ "$current" != "$latest" ] && [ "$AUTO_PR" == "true" ]; then
              update_cask "$name" "$latest"
            fi
          done
