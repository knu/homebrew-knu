name: Livecheck and Auto-update

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      auto_pr:
        description: 'Create PRs for outdated packages'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  livecheck:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Add tap
        run: brew tap ${{ github.repository }}

      - name: Configure git
        env:
          GITHUB_TOKEN: ${{ secrets.GH_WORKFLOW_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Initialize summary
        run: |
          echo "## Livecheck Results" >> "$GITHUB_STEP_SUMMARY"

      - name: Check and update formulae
        env:
          GITHUB_TOKEN: ${{ secrets.GH_WORKFLOW_PAT }}
          AUTO_PR: ${{ github.event.inputs.auto_pr || 'true' }}
          REPO: ${{ github.repository }}
        run: |
          # shellcheck disable=SC2001
          TAP=$(echo "$REPO" | sed 's|/homebrew-|/|')

          update_formula() {
            local name="$1"
            local new_version="$2"

            echo "Updating $name to $new_version..."

            git checkout -b "bump-$name-$new_version"

            brew bump-formula-pr --no-browse --no-fork --write-only \
              --version="$new_version" \
              "$TAP/$name"

            if git diff --stat; then
              git add Formula/"$name".rb
              git commit -m "$name $new_version"
              git push -f origin "bump-$name-$new_version"

              gh pr create \
                --title "$name $new_version" \
                --body "Automated version bump to $new_version" \
                --base main \
                --head "bump-$name-$new_version"
            fi

            git checkout main
          }

          echo "### Formulae" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for formula in Formula/*.rb; do
            [ -f "$formula" ] || continue
            name=$(basename "$formula" .rb)
            echo "::group::livecheck $name"
            result=$(brew livecheck "$TAP/$name" --json) || {
              echo "livecheck failed for $name"
              echo "::endgroup::"
              continue
            }
            echo "$result"
            echo "::endgroup::"

            current=$(echo "$result" | jq -r '.[0].version.current')
            latest=$(echo "$result" | jq -r '.[0].version.latest')

            echo "- **$name**: $current → $latest" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$latest" ] && [ "$latest" != "null" ] && [ "$current" != "$latest" ] && [ "$AUTO_PR" == "true" ]; then
              update_formula "$name" "$latest"
            fi
          done

      - name: Check and update casks
        env:
          GITHUB_TOKEN: ${{ secrets.GH_WORKFLOW_PAT }}
          AUTO_PR: ${{ github.event.inputs.auto_pr || 'true' }}
          REPO: ${{ github.repository }}
        run: |
          # shellcheck disable=SC2001
          TAP=$(echo "$REPO" | sed 's|/homebrew-|/|')

          update_cask() {
            local name="$1"
            local new_version="$2"

            echo "Updating $name to $new_version..."

            git checkout -b "bump-$name-$new_version"

            brew bump-cask-pr --no-browse --no-fork --write-only --no-audit \
              --version="$new_version" \
              "$TAP/$name"

            if ! git diff --stat | grep -q .; then
              git checkout main
              git branch -D "bump-$name-$new_version" 2>/dev/null || true
              return 0
            fi

            git add Casks/"$name".rb
            git commit -m "$name $new_version"
            git push -f origin "bump-$name-$new_version"

            gh pr create \
              --title "$name $new_version" \
              --body "Automated version bump to $new_version" \
              --base main \
              --head "bump-$name-$new_version"

            git checkout main
          }

          echo "### Casks" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for cask in Casks/*.rb; do
            [ -f "$cask" ] || continue
            name=$(basename "$cask" .rb)
            echo "::group::livecheck $name"
            result=$(brew livecheck --cask "$TAP/$name" --json) || {
              echo "livecheck failed for $name"
              echo "::endgroup::"
              continue
            }
            echo "$result"
            echo "::endgroup::"

            current=$(echo "$result" | jq -r '.[0].version.current')
            latest=$(echo "$result" | jq -r '.[0].version.latest')

            echo "- **$name**: $current → $latest" >> "$GITHUB_STEP_SUMMARY"

            if [ -n "$latest" ] && [ "$latest" != "null" ] && [ "$current" != "$latest" ] && [ "$AUTO_PR" == "true" ]; then
              update_cask "$name" "$latest"
            fi
          done
